# WARNING: Replace the example passwords with secure secrets.
# WARNING: 'my_secret_phpipam_pass' and 'my_secret_mysql_root_pass'
#docker-compose up -d
#docker compose down
#docker compose down - v (THIS DELETES VOLUMES)

services:
  phpipam-web:
    image: phpipam/phpipam-www:latest
    ports:
      - "18080:80"
    environment:
      - TZ=America/Chicago
      #- IPAM_DISABLE_INSTALLER=1
      # IMPORTANT: on install comment this line out. 
      - IPAM_DATABASE_HOST=phpipam-db
      - IPAM_DATABASE_NAME=phpipam
      - IPAM_DATABASE_USER=root
      # IMPORTANT: on install change this to root!
      - IPAM_DATABASE_PASS=******
      # IMPORTANT: allow DB login from docker network clients
      - IPAM_DATABASE_WEBHOST=%
    depends_on:
      - phpipam-db
    restart: unless-stopped
    networks:
      - phpipam_net

  phpipam-cron:
    image: phpipam/phpipam-cron:latest
    environment:
      - TZ=America/Chicago
      - IPAM_DATABASE_HOST=phpipam-db
      - IPAM_DATABASE_NAME=phpipam
      - IPAM_DATABASE_USER=phpipam
      - IPAM_DATABASE_PASS=******
      - SCAN_INTERVAL=1h
    depends_on:
      - phpipam-db
    restart: unless-stopped
    networks:
      - phpipam_net

  phpipam-db:
    image: mariadb:latest
    environment:
      - MYSQL_ROOT_PASSWORD=******
      - MYSQL_DATABASE=phpipam
      - MYSQL_USER=phpipam
      - MYSQL_PASSWORD=******
    volumes:
      - phpipam-db-data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - phpipam_net

networks:
  phpipam_net:
    driver: bridge

volumes:
  phpipam-db-data:
